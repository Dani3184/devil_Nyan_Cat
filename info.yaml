# Tiny Tapeout project information
project:
  title: "Devil Nyan Cat VGA"
  author: "Daniel García"
  discord: "dani_318"
  description: "VGA Nyan Cat with devil mode toggle and simple PWM audio output."

  language: "Verilog"

  clock_hz: 25000000

  tiles: "1x1"

  top_module: "tt_um_dual_nyancat"

  source_files:
    - "hvsync_generator.v"
    - "tt_um_dual_nyancat.v"

pinout:
  # Inputs
  ui[0]: "Mode select (0 = normal, 1 = devil)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs (VGA + audio mixed on uio)
  uo[0]: "R0"
  uo[1]: "G0"
  uo[2]: "B0"
  uo[3]: "HSYNC"
  uo[4]: "VSYNC"
  uo[5]: "R1"
  uo[6]: "G1"
  uo[7]: "B1"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: "Audio PWM output"

yaml_version: 6
